name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint dependencies
        run: python scripts/ci/install_python_deps.py --group lint

      - name: Validate pyproject.toml
        run: python scripts/ci/validate_pyproject.py

      - name: Ruff check
        run: python -m ruff check . --output-format=github

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy .

      - name: Collect diagnostics
        if: always()
        run: python scripts/ci/collect_diagnostics.py --job lint

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-lint-diagnostics-${{ github.run_id }}
          path: artifacts/diagnostics/
          if-no-files-found: warn
          retention-days: 14

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: python scripts/ci/install_python_deps.py --group test

      - name: Run deterministic test suite
        run: python scripts/ci/run_pytest.py --suite unit --timeout 120

      - name: Collect diagnostics
        if: always()
        run: python scripts/ci/collect_diagnostics.py --job test

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-diagnostics-${{ github.run_id }}
          path: |
            artifacts/diagnostics/
            artifacts/test-results/
          if-no-files-found: warn
          retention-days: 14

  cpp-build:
    name: C++ build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential cmake ninja-build pkg-config

      - name: Build C++ components when present
        run: bash scripts/ci/build_cpp.sh

      - name: Collect diagnostics
        if: always()
        run: python3 scripts/ci/collect_diagnostics.py --job cpp-build

      - name: Upload C++ diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-cpp-diagnostics-${{ github.run_id }}
          path: |
            artifacts/diagnostics/
            artifacts/cpp/
          if-no-files-found: warn
          retention-days: 14

  quality-gate:
    name: Quality gate
    if: always()
    needs: [lint, test, cpp-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Evaluate required jobs
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## CI quality gate"
            echo
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Lint | ${{ needs.lint.result }} |"
            echo "| Test | ${{ needs.test.result }} |"
            echo "| C++ build | ${{ needs.cpp-build.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.cpp-build.result }}" != "success" ]]; then
            echo "::error title=CI quality gate failed::One or more required CI jobs failed. Open the failed job and download its diagnostics artifact."
            exit 1
          fi
